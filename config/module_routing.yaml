# ============================================================================
# 模块路由关键词配置 — 五大审查模块语义边界严格定义
# ============================================================================
#
# ┌─────────────────────────┬─────────────────────────────────────────────────┐
# │ 模块 (key)              │ 审查范围                                        │
# ├─────────────────────────┼─────────────────────────────────────────────────┤
# │ structure_completeness  │ 方案是否覆盖必备章节、目录项和大纲结构          │
# │ parameter_consistency   │ 数值/名称/人员/编号等信息前后是否统一           │
# │ legality_compliance     │ 是否符合法律法规、强制条文和安全规程            │
# │ execution_continuity    │ 技术措施、安全措施、工艺方案的充分性与合理性    │
# │ evidence_validation     │ 编制依据的有效性、计算正确性和佐证材料充分性    │
# └─────────────────────────┴─────────────────────────────────────────────────┘
#
# 路由优先级：
#   1. template_id 硬映射（代码内 _TEMPLATE_HARD_MODULE）
#   2. 标题关键词匹配（本文件定义）— 纠偏优先于 Hermes module_name
#      匹配顺序：structure → parameter → compliance → evidence → execution
#   3. Hermes module_name fallback
#   4. category_map fallback

generic:
  structure_completeness:
    # 方案有没有这个章节/目录项
    - 章节不完整
    - 章节缺失
    - 大纲
    - 目录缺
    - 框架缺
    - 缺少章节
    - 通用章节

  parameter_consistency:
    # 文档内 A 处说 X，B 处说 Y，两者矛盾
    # 注意：不能用"冲突"（太宽泛，会误抢"版本冲突"→evidence）
    - 矛盾
    - 不一致
    - 逻辑冲突
    - 逻辑错误
    - 悖论
    - 重复派工
    - 不匹配
    - 人员重复
    - 参数缺失
    - 留白
    - 职责交叉

  legality_compliance:
    # 明确引用/违反了某条法规、安规、强制条文
    - 违规
    - 违反
    - 强制性条文
    - 资质
    - 许可

  evidence_validation:
    # 支撑性的记录/附件/标准引用 是否存在 + 是否有效
    # -- 标准/依据有效性
    - 编制依据
    - 现行有效
    - 废止
    - 过期
    - 替代
    - 规范版本
    - 标准号
    - 引用版本
    - 版本滞后
    - 版本冲突
    # -- 计算/验算
    - 计算错误
    - 验算
    - 算式
    - 校核
    - 算术错误
    # -- 缺失记录/证据/附件（核心区分词）
    - 记录缺失
    - 记录缺
    - 证据链
    - 证据不足
    - 未附
    - 图纸
    - 附件
    - 施工平面布置
    # -- 表格/清单缺项或空白
    - 字段全空
    - 字段空白
    - 清单缺
    - 清单严重缺
    - 配置清单
    # -- 签章/审批文书
    - 签章
    - 资料归档
    - 归档

  execution_continuity:
    # 技术措施、安全措施、工艺方案的充分性与合理性
    # 这个模块范围更宽：不仅仅是步骤时序，还包括措施是否充分
    - 流程缺失
    - 流程断裂
    - 流程极度简化
    - 操作程序
    - 管控缺失
    - 措施未细化
    - 措施未明确
    - 措施缺失
    - 防护措施
    - 保护范围
    - 应急预案
    - 应急保障
    - 工艺
    - 隔离措施

document_types:
  # ————————————————————————————————
  # 配网工程专项施工方案 / 停电施工方案
  # ————————————————————————————————
  distribution_network_special_scheme:
    legality_compliance:
      - 安规
      - 工作票
      - 操作票
      - 唱票复诵
      - 双人监护

    execution_continuity:
      - 停送电
      - 五步法
      - 拆地线
      - 核相
      - 送电流程
      - 倒闸
      - 停电申请
      - 用户告知
      - 拆接地线
      - 恢复送电
      - 接地保护
      - 防触电

    parameter_consistency:
      - 吨

  # ————————————————————————
  # 施工组织设计
  # ————————————————————————
  construction_org:
    legality_compliance:
      - 安规
      - 工作票
      - 安全资质

    execution_continuity:
      - 施工工序
      - 吊装顺序
      - 基础浇筑

    parameter_consistency:
      - 吨位
      - 起重量
